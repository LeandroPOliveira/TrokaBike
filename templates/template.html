{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Troka Bike</title>

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>


<!-- NAVBAR -->

<header class="navbar-custom">

    <div class="container navbar-container">


        <!-- LOGO -->

        <a href="{% url 'products:product_list' %}" class="logo">

            <img src="{% static 'img/logo.png' %}">

            <span>troka bike</span>

        </a>


        <!-- MENU CATEGORIAS -->

        <nav class="menu">

            <a href="{% url 'products:product_by_category' 'MOUNTAIN' %}">
                Mountain
            </a>

            <a href="{% url 'products:product_by_category' 'ROAD' %}">
                Road
            </a>

            <a href="{% url 'products:product_by_category' 'GRAVEL' %}">
                Gravel
            </a>

        </nav>


        <!-- BUSCA -->

        <form method="GET" action="{% url 'products:product_list' %}" class="search-bar">

            <input
                    type="text"
                    name="q"
                    placeholder="Buscar bikes..."
                    value="{{ request.GET.q }}"
            >

            <button type="submit">
                <i class="fa fa-search"></i>
            </button>

        </form>


        <!-- AÇÕES -->

        <div class="nav-actions">


            <!-- CARRINHO -->

            <a href="{% url 'cart_detail' %}" class="cart-btn">

                <i class="fa fa-shopping-cart"></i>

                <span class="cart-count">

{% if cart %}
{{ cart|length }}
{% else %}
0
{% endif %}

</span>

            </a>


            <!-- USUARIO -->

            {% if user.is_authenticated %}

            <a href="{% url 'users:profile' %}" class="account-btn">
                <i class="fa fa-user"></i>
            </a>

            <form method="POST" action="{% url 'users:logout' %}" class="logout-form">
                {% csrf_token %}
                <button type="submit" class="logout-btn">
                    Sair
                </button>
            </form>

            {% else %}

            <a href="{% url 'login' %}" class="login-btn">
                Entrar
            </a>

            {% endif %}

        </div>


    </div>

</header>


<!-- CONTEUDO -->

{% block content %}

{% endblock %}


<!-- FOOTER -->

<footer class="footer">

    <div class="container footer-container">

        <p>
            © 2026 Troka Bike - Todos os direitos reservados
        </p>

    </div>

</footer>


</body>

</html>
